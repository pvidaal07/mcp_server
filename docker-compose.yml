version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: tasks_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: tasks_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
